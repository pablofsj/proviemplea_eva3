services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proviemplea_app
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:stable-alpine
    container_name: proviemplea_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: proviemplea_mysql
    restart: always
    environment:
      MYSQL_DATABASE: proviemplea_eva3
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: proviemplea
      MYSQL_PASSWORD: proviemplea123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
